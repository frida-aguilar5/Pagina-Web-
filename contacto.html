<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Tomatontos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <nav class="site-nav">
            <button id="plantacion" class="btnPlantacion">Plantación</button>
            <button id="inicio" class="btnInicio">Inicio</button>
        </nav>
        <div class="header-content">
            <h1>Tomatontos</h1>
            <p class="subtitle">Monitoreo y análisis de precios del tomate</p>
        </div>
    </header>

    <main class="dashboard-container">
        <section class="contact-section">
            <h2 class="section-title">Contáctanos</h2>
            <p>Si tienes alguna pregunta o comentario, no dudes en ponerte en contacto con nosotros.</p>
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Nombre:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Mensaje:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Enviar</button>
            </form>
        </section>
    </main>
    <script src="java\script.java"></script>
</body>
</html>
